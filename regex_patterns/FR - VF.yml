name: FR - VF
pattern: (?i)\b(VFF|VFI|VF2|TRUEFRENCH|VF)\b
description: Matches French version markers in release titles (VFF, VFI, VF2, TRUEFRENCH,
  VF)
tags:
- Language
- French
