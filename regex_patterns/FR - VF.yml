  expected: true
- id: 6
  input: Movie.2024.VF2.1080p.WEB-DL.x265-GROUP
  expected: true
- id: 7
  input: Movie.2024.VF.1080p.WEB-DL.x265-GROUP
  expected: true
- id: 8
  input: Movie.2024.1080p.WEB-DL.x265-GROUP
  expected: false
